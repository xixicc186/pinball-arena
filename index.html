<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>弹球角斗场</title>
    <link rel="stylesheet" href="./styles.css?v=20260312c" />
  </head>
  <body>
    <div class="shell">
      <main class="app-shell">
        <section class="arena-panel">
          <canvas
            id="arena-canvas"
            width="1080"
            height="1920"
            aria-label="弹球角斗场画布"
          ></canvas>

          <div class="arena-top-left">
            <section class="battle-feed-panel" aria-label="战斗播报">
              <div class="panel-head battle-feed-head">
                <h2>战斗播报</h2>
              </div>
              <div id="feed" class="feed"></div>
            </section>

            <section class="panel arena-status-panel" aria-label="战斗计时">
              <div class="arena-status-grid">
                <div class="hud-block">
                  <span class="hud-label">计时</span>
                  <strong id="hud-timer">0.0s</strong>
                </div>
                <div class="hud-block">
                  <span class="hud-label">阶段</span>
                  <strong id="hud-phase">选择角色后开始</strong>
                </div>
              </div>
            </section>
          </div>

          <section class="panel battle-score-panel" aria-label="存活列表">
            <div class="panel-head battle-score-head">
              <h2>存活列表</h2>
            </div>
            <div id="scoreboard" class="scoreboard"></div>
          </section>

          <div id="overlay" class="overlay hidden"></div>
          <div id="entry-stage" class="entry-stage hidden" aria-live="polite">
            <div class="entry-stage-inner">
              <div id="entry-stage-cards" class="entry-stage-cards"></div>
            </div>
          </div>
        </section>

        <section class="panel toolbar-panel">
          <div class="mode-tabs" role="tablist" aria-label="玩法切换">
            <button
              id="mode-classic-button"
              class="mode-tab active"
              type="button"
              role="tab"
              aria-selected="true"
            >
              自由混战
            </button>
            <button
              id="mode-tournament-button"
              class="mode-tab"
              type="button"
              role="tab"
              aria-selected="false"
            >
              赛事玩法
            </button>
          </div>

          <div id="classic-mode-panel" class="mode-panel active">
            <div class="toolbar-row">
              <button id="record-button" class="secondary-button" type="button">录制对局</button>
              <button id="start-button" class="primary-button" type="button">开始出战</button>

              <label class="toolbar-toggle">
                <input id="edge-spikes-toggle" type="checkbox" checked />
                <span>随机一侧生成边缘尖刺</span>
              </label>

              <label class="toolbar-setting">
                <span class="setting-label">进入下一阶段时间</span>
                <span class="setting-control">
                  <input id="duel-time-input" type="number" min="5" step="1" value="45" />
                  <span class="setting-unit">秒</span>
                </span>
              </label>

              <button id="open-roster-button" class="secondary-button" type="button">角色选择与编辑</button>
            </div>

            <div class="toolbar-meta">
              <span id="roster-status" class="roster-status">已选择 0 名出战角色</span>
            </div>
          </div>

          <div id="tournament-mode-panel" class="mode-panel hidden">
            <div class="tournament-format-tabs" role="tablist" aria-label="赛事格式切换">
              <button id="tournament-format-team-button" class="tournament-format-button active" type="button" aria-pressed="true">组队赛</button>
              <button id="tournament-format-solo-button" class="tournament-format-button" type="button" aria-pressed="false">个人战</button>
            </div>

            <div class="toolbar-row tournament-toolbar-row">
              <button id="tournament-record-button" class="secondary-button" type="button">录制整届赛事</button>
              <button id="tournament-start-button" class="primary-button" type="button">开始赛事</button>
              <button id="tournament-draw-button" class="secondary-button" type="button">随机抽签分组</button>
              <button id="open-roster-button-tournament" class="secondary-button" type="button">角色选择与编辑</button>
            </div>

            <div class="toolbar-meta tournament-meta">
              <span id="tournament-status" class="roster-status">赛事模式需要恰好 16 名出战角色。</span>
              <span id="tournament-summary" class="tournament-summary">
                随机分成 8 组，每组 2 人，依次进行 8 进 4、4 进 2 和决胜组对决。
              </span>
            </div>
          </div>
        </section>

        <section id="tournament-panel" class="panel tournament-panel hidden" aria-label="赛事赛程">
          <div class="panel-head">
            <h2>赛事赛程图</h2>
            <span id="tournament-round-indicator" class="tournament-round-indicator">等待抽签</span>
          </div>
          <div id="tournament-groups" class="tournament-groups"></div>
          <div id="tournament-bracket" class="tournament-bracket"></div>
        </section>
      </main>
    </div>

    <div id="roster-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Roster</p>
            <h2 id="modal-title">角色选择与编辑</h2>
            <p id="modal-roster-status" class="modal-note">已选择 0 名出战角色</p>
          </div>

          <div class="modal-actions">
            <button id="select-all-button" class="secondary-button" type="button">全选</button>
            <button id="clear-roster-button" class="secondary-button" type="button">仅保留当前</button>
            <button id="reset-button" class="secondary-button" type="button">重置当前角色</button>
            <button id="close-roster-button" class="secondary-button" type="button">关闭</button>
          </div>
        </div>

        <div class="modal-body">
          <section class="modal-column modal-roster-column">
            <div id="roster" class="roster"></div>
          </section>

          <section class="modal-column modal-editor-column">
            <div id="character-editor" class="editor-panel"></div>
          </section>
        </div>
      </section>
    </div>

    <script type="module" src="./src/main.js?v=20260312c"></script>
  </body>
</html>
